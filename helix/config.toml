theme = 'base16_minimal'

[editor]
auto-completion = false
color-modes = true
end-of-line-diagnostics = 'disable'
popup-border = 'all'

[editor.cursor-shape]
insert = 'bar'
select = 'underline'

[editor.file-picker]
hidden = false

[editor.gutters]
layout = ['line-numbers', 'spacer']

[editor.gutters.line-numbers]
min-width = 1

[editor.statusline]
right = ['diagnostics', 'selections', 'file-type']

[editor.statusline.mode]
insert = 'I'
normal = 'N'
select = 'S'
