[[language]]
name = 'python'
language-servers = ['basedpyright', 'ruff']
auto-format = true

[[language]]
name = 'javascript'
formatter = { command = 'prettier', args = [
  '--parser',
  'typescript',
  '--stdin-filepath',
  '%{buffer_name}',
] }
language-servers = ['vtsls', 'oxlint-language-server']
auto-format = true

[[language]]
name = 'jsx'
formatter = { command = 'prettier', args = [
  '--parser',
  'typescript',
  '--stdin-filepath',
  '%{buffer_name}',
] }
language-servers = ['vtsls', 'oxlint-language-server', 'tailwindcss-ls']
auto-format = true

[[language]]
name = 'css'
formatter = { command = 'prettier', args = [
  '--parser',
  'css',
  '--stdin-filepath',
  '%{buffer_name}',
] }
auto-format = true

[[language]]
name = 'json'
formatter = { command = 'prettier', args = [
  '--parser',
  'json',
  '--stdin-filepath',
  '%{buffer_name}',
] }
auto-format = true

[[language]]
name = 'markdown'
auto-format = true

[[language]]
name = 'html'
formatter = { command = 'prettier', args = [
  '--parser',
  'html',
  '--stdin-filepath',
  '%{buffer_name}',
] }
auto-format = true

[[language]]
name = 'typescript'
formatter = { command = 'prettier', args = [
  '--parser',
  'typescript',
  '--stdin-filepath',
  '%{buffer_name}',
] }
language-servers = ['vtsls', 'oxlint-language-server']
auto-format = true

[[language]]
name = 'tsx'
formatter = { command = 'prettier', args = [
  '--parser',
  'typescript',
  '--stdin-filepath',
  '%{buffer_name}',
] }
language-servers = ['vtsls', 'oxlint-language-server', 'tailwindcss-ls']
auto-format = true

[[language]]
name = 'graphql'
formatter = { command = 'prettier', args = [
  '--parser',
  'graphql',
  '--stdin-filepath',
  '%{buffer_name}',
] }
auto-format = true

[[language]]
name = 'clojure'
formatter = { command = 'cljstyle', args = ['pipe'] }
auto-format = true

[[language]]
name = 'java'
formatter = { command = 'google-java-format', args = ['-'] }
auto-format = true

[language-server.rust-analyzer.config.check]
command = 'clippy'

[[language]]
name = 'toml'
auto-format = true

[language-server.phpantom]
command = 'phpantom_lsp'

[[language]]
name = 'php'
language-servers = ['phpantom']
auto-format = true

[[language]]
name = 'hurl'
auto-format = true

[language-server.vtsls.config.javascript.preferences]
importModuleSpecifier = 'non-relative'
importModuleSpecifierEnding = 'minimal'

[language-server.vtsls.config.typescript.preferences]
autoImportFileExcludePatterns = [
  'next/router.d.ts',
  'next/dist/client/router.d.ts',
  'lucide-react',
]
importModuleSpecifier = 'non-relative'
importModuleSpecifierEnding = 'minimal'

[[language]]
name = 'kotlin'
language-servers = ['kotlin-lsp']
