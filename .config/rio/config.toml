confirm-before-quit = false
option-as-alt = 'left'
padding-x = 10
padding-y = [10, 10]

[adaptive-theme]
dark = 'Ef-Dark'
light = 'Ef-Light'

[editor]
program = '/opt/homebrew/bin/hx'

[fonts]
family = 'PragmataPro Mono'
hinting = false
size = 12

[navigation]
current-working-directory = true
mode = 'NativeTab'
use-split = false
