[[language]]
name = 'python'
language-servers = [ 'basedpyright', 'ruff' ]
auto-format = true

[[language]]
name = 'javascript'
formatter = { command = 'yarn', args = ['exec', 'prettier', '--parser', 'typescript', '--stdin-filepath', 'main.js'] }
auto-format = true

[[language]]
name = 'jsx'
formatter = { command = 'yarn', args = ['exec', 'prettier', '--parser', 'typescript', '--stdin-filepath', 'main.jsx'] }
auto-format = true

[[language]]
name = 'css'
formatter = { command = 'yarn', args = ['exec', 'prettier', '--parser', 'css', '--stdin-filepath', 'main.css'] }
auto-format = true

[[language]]
name = 'json'
formatter = { command = 'yarn', args = ['exec', 'prettier', '--parser', 'json', '--stdin-filepath', 'main.json'] }
auto-format = true

[[language]]
name = 'markdown'
formatter = { command = 'yarn', args = ['exec', 'prettier', '--parser', 'markdown', '--stdin-filepath', 'main.md'] }
auto-format = true

[[language]]
name = 'html'
formatter = { command = 'yarn', args = ['exec', 'prettier', '--parser', 'html', '--stdin-filepath', 'main.html'] }
auto-format =  true

[[language]]
name = 'typescript'
formatter = { command = 'yarn', args = ['exec', 'prettier', '--parser', 'typescript', '--stdin-filepath', 'main.ts'] }
auto-format = true

[[language]]
name = 'tsx'
formatter = { command = 'yarn', args = ['exec', 'prettier', '--parser', 'typescript', '--stdin-filepath', 'main.tsx'] }
language-servers = [ 'typescript-language-server', 'tailwindcss-ls' ]
auto-format = true

[[language]]
name = 'graphql'
formatter = { command = 'yarn', args = ['exec', 'prettier', '--parser', 'graphql', '--stdin-filepath', 'main.graphql'] }
auto-format = true

[[language]]
name = 'clojure'
formatter = { command = 'cljstyle', args = ['pipe'] }
auto-format = true

[[language]]
name = 'java'
formatter = { command = 'google-java-format', args = ['-'] }
auto-format = true

[language-server.phpactor]
command = 'phpactor'
args = ['language-server']

[[language]]
name = 'php'
language-servers = [ 'phpactor' ]
auto-format = true
