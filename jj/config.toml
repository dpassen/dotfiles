#:schema https://jj-vcs.dev/latest/config-schema.json

[user]
name = 'Derek Passen'
email = 'dpassen1@gmail.com'

[ui]
default-command = 'log'
diff-editor = ':builtin'
merge-editor = ':builtin'

[revsets]
bookmark-advance-to = 'heads(::@ & mutable() & ~description(exact:"") & (~empty() | merges()))'

[templates]
git_push_bookmark = '"dpassen/" ++ change_id.short()'

[template-aliases]
'format_timestamp(timestamp)' = 'timestamp.local().format("%F")'
