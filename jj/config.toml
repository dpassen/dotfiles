'$schema' = 'https://jj-vcs.github.io/jj/latest/config-schema.json'

[user]
name = 'Derek Passen'
email = 'dpassen1@gmail.com'

[colors]
'prefix' = { bold = true, underline = true }
'rest' = 'white'
'working_copy change_id rest' = { bold = false }
'working_copy commit_id rest' = { bold = false }

[ui]
default-command = 'log'

[templates]
git_push_bookmark = '''
concat(
  author.email().local().replace(regex:"\\d", ""),
  "/push-",
  change_id.short()
)
'''

[template-aliases]
'format_timestamp(timestamp)' = 'timestamp.local().format("%Y-%m-%d")'

[lazyjj]
highlight-color = 'bright black'
